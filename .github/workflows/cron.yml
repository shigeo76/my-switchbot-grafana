name: SwitchBot-Push
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest  # Ubuntuを捨てて、成功実績のあるWindowsを使います
    steps:
      - name: Run PowerShell Script
        env:
          SB_TOKEN: ${{ secrets.SB_TOKEN }}
          SB_SECRET: ${{ secrets.SB_SECRET }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        shell: powershell
        run: |
          # 1. SwitchBotからデータ取得
          $t = [DateTimeOffset]::Now.ToUnixTimeMilliseconds()
          $t = "$t" # 文字列に変換
          $t = [math]::Floor($t)
          $nonce = "anything"
          $sign_str = "${env:SB_TOKEN}$($t)$($nonce)"
          $hmac = New-Object System.Security.Cryptography.HMACSHA256
          $hmac.Key = [System.Text.Encoding]::UTF8.GetBytes("${env:SB_SECRET}")
          $sign = [Convert]::ToBase64String($hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($sign_str))).ToUpper()
          $sb_headers = @{ "Authorization" = "${env:SB_TOKEN}"; "sign" = $sign; "nonce" = $nonce; "t" = "$t" }
          
          $res = Invoke-RestMethod -Uri "https://api.switch-bot.com/v1.1/devices/C6A83697434C/status" -Headers $sb_headers
          
          if ($res.statusCode -eq 100) {
              $temp = $res.body.temperature
              $hum = $res.body.humidity
              # 2. PowerShellで成功した「生データ」を作成
              $payload = "switchbot,device=kaidanshitsu temperature=$temp,humidity=$hum"
              
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${env:GRAFANA_USER}:${env:GRAFANA_TOKEN}"))
              $g_headers = @{ 
                  "Authorization" = "Basic $auth"
                  "Content-Type" = "application/x-protobuf"
                  "X-Prometheus-Remote-Write-Version" = "0.1.0"
              }
              
              # 3. 送信
              $g_res = Invoke-WebRequest -Uri "${env:GRAFANA_URL}" -Method Post -Headers $g_headers -Body $payload
              Write-Host "Success! Status: $($g_res.StatusCode)"
          }
